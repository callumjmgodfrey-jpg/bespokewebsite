[build]
  functions = "netlify/functions"

# ── Security headers on all responses ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; media-src 'self'; frame-src https://www.youtube.com; connect-src 'self' https://api.frankfurter.app https://a.klaviyo.com https://api.netlify.com;"

# ── Rate limiting on form submission function ──
[[functions]]
  path = "/api/submit-order"
  rate_limit = { window_size = 60, max_rate = 3 }

[[functions]]
  path = "/api/submission-count"
  rate_limit = { window_size = 60, max_rate = 20 }
